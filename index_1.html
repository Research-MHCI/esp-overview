<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Executive Support Programme: Canonical Reference</title>
<meta name="description" content="The definitive reference for the Executive Support Programme (ESP) by Mosaic Human Capital Innovations." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --teal:#33A6B2;
  --teal-deep:#338B85;
  --charcoal:#333333;

  --bg:#FBFCFC;
  --surface:#FFFFFF;
  --surface-2:#F3F7F7;
  --border:#E1E9E9;
  --border-strong:#C9D6D6;
  --text:#333333;
  --text-dim:#5F6E6E;
  --text-faint:#8B9999;
  --rail:#DCE6E6;

  --font-display:"DM Serif Display",Georgia,serif;
  --font-body:"Plus Jakarta Sans",system-ui,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,monospace;

  --sidebar-w:288px;
  --maxw:820px;
  --radius:3px;
  --shadow:0 1px 2px rgba(20,40,40,.04),0 8px 24px -12px rgba(20,40,40,.10);
}
[data-theme="dark"]{
  --bg:#141D1D;
  --surface:#1B2726;
  --surface-2:#20302E;
  --border:#2B3B3A;
  --border-strong:#3B4E4C;
  --text:#E6EDEC;
  --text-dim:#9FB1B0;
  --text-faint:#718382;
  --rail:#2B3B3A;
  --teal:#4CBFCB;
  --teal-deep:#4FA9A2;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -12px rgba(0,0,0,.5);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-weight:400;
  font-size:16.5px;
  line-height:1.68;
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease,color .25s ease;
}

a{color:inherit}
::selection{background:var(--teal);color:#fff}

/* ============ LAYOUT ============ */
.shell{display:flex;min-height:100vh}

/* ---- SIDEBAR ---- */
.sidebar{
  width:var(--sidebar-w);
  flex:0 0 var(--sidebar-w);
  border-right:1px solid var(--border);
  background:var(--surface);
  height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;
  z-index:40;
}
.brand{
  padding:26px 22px 18px;
  border-bottom:1px solid var(--border);
}
.brand-mark{
  font-family:var(--font-display);
  font-size:26px;line-height:1.1;letter-spacing:-.01em;
  color:var(--text);
}
.brand-mark em{font-style:italic;color:var(--teal-deep)}
.brand-sub{
  font-family:var(--font-mono);
  font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-faint);margin-top:8px;
}

.search-wrap{padding:16px 18px;border-bottom:1px solid var(--border);position:relative}
.search-input{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius);padding:9px 11px 9px 32px;
  font-family:var(--font-body);font-size:13.5px;color:var(--text);
  outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--teal)}
.search-input::placeholder{color:var(--text-faint)}
.search-icon{
  position:absolute;left:28px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;opacity:.45;pointer-events:none;
}
.search-results{
  position:absolute;left:18px;right:18px;top:calc(100% - 6px);
  background:var(--surface);border:1px solid var(--border-strong);
  box-shadow:var(--shadow);border-radius:var(--radius);
  max-height:340px;overflow-y:auto;z-index:60;display:none;
}
.search-results.open{display:block}
.sr-item{
  display:block;padding:9px 12px;border-bottom:1px solid var(--border);
  text-decoration:none;cursor:pointer;
}
.sr-item:last-child{border-bottom:0}
.sr-item:hover,.sr-item:focus{background:var(--surface-2);outline:none}
.sr-kind{
  font-family:var(--font-mono);font-size:8.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--teal-deep);
}
.sr-title{font-size:13.5px;font-weight:500;margin-top:2px;color:var(--text)}
.sr-empty{padding:14px 12px;font-size:13px;color:var(--text-faint)}

.nav{flex:1;overflow-y:auto;padding:18px 0 40px}
.nav-group{margin-bottom:22px}
.nav-label{
  font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--text-faint);
  padding:0 22px 8px;
}
.nav-link{
  display:block;padding:6px 22px;font-size:14px;color:var(--text-dim);
  text-decoration:none;border-left:2px solid transparent;
  transition:color .12s,border-color .12s,background .12s;
}
.nav-link:hover{color:var(--text);background:var(--surface-2)}
.nav-link.active{color:var(--teal-deep);border-left-color:var(--teal);font-weight:600;background:var(--surface-2)}
.nav-link:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}

/* curriculum tree */
.tree-phase{margin-bottom:2px}
.tree-toggle{
  width:100%;text-align:left;background:none;border:0;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  padding:6px 22px;font-family:var(--font-body);
  font-size:12.5px;font-weight:600;color:var(--text-dim);
  letter-spacing:.01em;
}
.tree-toggle:hover{color:var(--text)}
.tree-toggle:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}
.chev{width:9px;height:9px;transition:transform .18s;flex:0 0 9px;opacity:.6}
.tree-phase.open .chev{transform:rotate(90deg)}
.tree-body{display:none;padding-bottom:6px}
.tree-phase.open .tree-body{display:block}
.tree-link{
  display:flex;gap:10px;align-items:baseline;
  padding:5px 22px 5px 40px;font-size:13.5px;color:var(--text-dim);
  text-decoration:none;border-left:2px solid transparent;
}
.tree-link:hover{color:var(--text);background:var(--surface-2)}
.tree-link.active{color:var(--teal-deep);border-left-color:var(--teal);font-weight:600;background:var(--surface-2)}
.tree-wk{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);flex:0 0 24px}
.tree-link.active .tree-wk{color:var(--teal)}

.side-foot{
  border-top:1px solid var(--border);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.theme-btn{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);
  border-radius:var(--radius);padding:6px 10px;cursor:pointer;
  font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
}
.theme-btn:hover{color:var(--text);border-color:var(--border-strong)}
.theme-btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.print-btn{
  background:none;border:0;color:var(--text-faint);cursor:pointer;
  font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
}
.print-btn:hover{color:var(--teal-deep)}

/* ---- MAIN ---- */
.main{flex:1;min-width:0}
.topbar{
  display:none;position:sticky;top:0;z-index:50;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 18px;align-items:center;gap:12px;
}
.burger{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:7px 9px;cursor:pointer;color:var(--text)}
.content{padding:56px 48px 120px;max-width:calc(var(--maxw) + 96px);margin:0 auto}

/* breadcrumbs */
.crumbs{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--text-faint);margin-bottom:26px;
  display:flex;gap:9px;flex-wrap:wrap;align-items:center;
}
.crumbs a{color:var(--text-faint);text-decoration:none}
.crumbs a:hover{color:var(--teal-deep)}
.crumbs span.sep{opacity:.4}
.crumbs .cur{color:var(--teal-deep)}

/* type */
.eyebrow{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--teal-deep);margin-bottom:14px;
}
h1{
  font-family:var(--font-display);font-weight:400;
  font-size:clamp(34px,4.6vw,52px);line-height:1.08;letter-spacing:-.015em;
  margin-bottom:20px;color:var(--text);
}
h1 em{font-style:italic;color:var(--teal-deep)}
h2{
  font-family:var(--font-display);font-weight:400;
  font-size:27px;line-height:1.24;letter-spacing:-.01em;
  margin:52px 0 16px;padding-top:10px;
}
h3{
  font-family:var(--font-body);font-weight:600;
  font-size:15.5px;letter-spacing:.005em;
  margin:32px 0 10px;
}
h4{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--text-faint);
  margin:26px 0 10px;font-weight:500;
}
p{margin-bottom:16px;color:var(--text-dim)}
p strong{color:var(--text);font-weight:600}
.lede{font-size:19px;line-height:1.6;color:var(--text);margin-bottom:30px}
ul,ol{margin:0 0 18px 20px;color:var(--text-dim)}
li{margin-bottom:7px;padding-left:3px}
li::marker{color:var(--teal)}
hr{border:0;border-top:1px solid var(--border);margin:44px 0}

/* rule under h2 */
h2::after{
  content:"";display:block;width:34px;height:2px;background:var(--teal);
  margin-top:14px;opacity:.55;
}

/* ---- SIGNATURE: THE SPINE ---- */
.spine{margin:44px 0 10px;border-left:1px solid var(--rail);padding-left:0}
.spine-row{
  display:grid;grid-template-columns:56px 1fr;gap:0;
  position:relative;
}
.spine-wk{
  font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);
  padding:15px 0 15px 16px;position:relative;
}
.spine-wk::before{
  content:"";position:absolute;left:-4.5px;top:22px;
  width:7px;height:7px;border-radius:50%;
  background:var(--bg);border:1.5px solid var(--rail);
}
.spine-row.gate .spine-wk::before{background:var(--teal);border-color:var(--teal)}
.spine-row.touch .spine-wk::before{background:var(--teal-deep);border-color:var(--teal-deep)}
.spine-body{
  padding:14px 0 14px 6px;border-bottom:1px solid var(--border);
}
.spine-row:last-child .spine-body{border-bottom:0}
.spine-title{
  font-size:15px;font-weight:600;color:var(--text);text-decoration:none;
  display:inline-block;
}
.spine-title:hover{color:var(--teal-deep)}
.spine-meta{font-size:13px;color:var(--text-faint);margin-top:3px}
.spine-tag{
  display:inline-block;margin-top:7px;
  font-family:var(--font-mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--teal-deep);border:1px solid var(--teal);border-radius:2px;
  padding:2px 6px;opacity:.9;
}
.phase-head{
  display:flex;align-items:baseline;gap:14px;
  padding:26px 0 8px 16px;margin-left:-1px;
  border-left:2px solid var(--teal);
}
.phase-head .pn{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal-deep)}
.phase-head .pt{font-family:var(--font-display);font-size:20px}
.phase-head .pd{font-size:13px;color:var(--text-faint);margin-left:auto}

/* ---- CARDS ---- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:24px 0}
.card{
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);padding:18px 18px 16px;
  text-decoration:none;display:block;
  transition:border-color .15s,transform .15s;
}
.card:hover{border-color:var(--teal);transform:translateY(-1px)}
.card:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.card-k{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-faint)}
.card-t{font-size:15px;font-weight:600;color:var(--text);margin:7px 0 5px;line-height:1.35}
.card-d{font-size:13.5px;color:var(--text-dim);line-height:1.5}

/* ---- CALLOUT ---- */
.callout{
  border:1px solid var(--border);border-left:2px solid var(--teal);
  background:var(--surface-2);border-radius:var(--radius);
  padding:18px 20px;margin:26px 0;
}
.callout h4{margin-top:0;color:var(--teal-deep)}
.callout p:last-child{margin-bottom:0}
.callout.gate{border-left-color:var(--charcoal)}
[data-theme="dark"] .callout.gate{border-left-color:var(--text-dim)}

/* ---- TABLE ---- */
.tbl{width:100%;border-collapse:collapse;margin:22px 0;font-size:14px}
.tbl th{
  text-align:left;font-family:var(--font-mono);font-size:9.5px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);
  font-weight:500;padding:0 14px 9px 0;border-bottom:1px solid var(--border-strong);
}
.tbl td{padding:12px 14px 12px 0;border-bottom:1px solid var(--border);color:var(--text-dim);vertical-align:top}
.tbl td:first-child{color:var(--text);font-weight:500;white-space:nowrap}
.tbl tr:last-child td{border-bottom:0}

/* ---- PILLS / META ---- */
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 30px}
.pill{
  font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--border-strong);border-radius:2px;padding:4px 8px;color:var(--text-dim);
}
.pill.on{border-color:var(--teal);color:var(--teal-deep)}

/* ---- QUESTION BLOCK ---- */
.q{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;margin:14px 0;background:var(--surface);
}
.q-arch{
  font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--teal-deep);margin-bottom:8px;
}
.q-stem{color:var(--text);font-size:14.5px;margin-bottom:10px}
.q-opts{list-style:none;margin:0 0 10px}
.q-opts li{
  font-size:13.5px;color:var(--text-dim);margin-bottom:5px;padding-left:22px;position:relative;
}
.q-opts li::before{
  content:attr(data-k);position:absolute;left:0;top:0;
  font-family:var(--font-mono);font-size:10px;color:var(--text-faint);
}
.q-opts li.key{color:var(--text)}
.q-opts li.key::before{color:var(--teal)}
.q-why{
  font-size:13px;color:var(--text-faint);border-top:1px solid var(--border);
  padding-top:9px;margin-top:4px;
}
.q-why b{color:var(--teal-deep);font-weight:600}

/* ---- RUBRIC ---- */
.rub{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:20px 0}
.rub-head{
  background:var(--surface-2);padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:baseline;gap:12px;
}
.rub-name{font-weight:600;font-size:14.5px;color:var(--text)}
.rub-w{font-family:var(--font-mono);font-size:10px;color:var(--teal-deep);letter-spacing:.1em}
.rub-band{display:grid;grid-template-columns:96px 1fr;gap:0;border-bottom:1px solid var(--border)}
.rub-band:last-child{border-bottom:0}
.rub-lvl{
  font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-faint);padding:12px 12px 12px 16px;background:var(--surface);
  border-right:1px solid var(--border);
}
.rub-desc{padding:12px 16px;font-size:13.5px;color:var(--text-dim);background:var(--surface)}

/* ---- PROGRESS ---- */
.prog{margin:30px 0 10px}
.prog-bar{height:2px;background:var(--rail);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--teal);width:0;transition:width .4s ease}
.prog-labels{
  display:flex;justify-content:space-between;margin-top:8px;
  font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-faint);
}
.done-btn{
  margin-top:20px;background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius);padding:9px 14px;cursor:pointer;color:var(--text-dim);
  font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
}
.done-btn:hover{border-color:var(--teal);color:var(--teal-deep)}
.done-btn.on{background:var(--teal);border-color:var(--teal);color:#fff}
.done-btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

/* ---- PAGER ---- */
.pager{display:flex;justify-content:space-between;gap:16px;margin-top:64px;padding-top:26px;border-top:1px solid var(--border)}
.pager a{
  text-decoration:none;flex:1;padding:14px 16px;border:1px solid var(--border);
  border-radius:var(--radius);transition:border-color .15s;
}
.pager a:hover{border-color:var(--teal)}
.pager .dir{font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
.pager .ttl{font-size:14px;font-weight:600;color:var(--text);margin-top:4px}
.pager .next{text-align:right}

/* ---- ANCHOR LIST ---- */
.anchors{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0 6px}
.anchor-chip{
  font-size:12.5px;text-decoration:none;color:var(--text-dim);
  border:1px solid var(--border);border-radius:2px;padding:5px 10px;
}
.anchor-chip:hover{border-color:var(--teal);color:var(--teal-deep)}

/* ---- FAQ ---- */
details{border-bottom:1px solid var(--border);padding:14px 0}
summary{cursor:pointer;font-weight:600;font-size:14.5px;color:var(--text);list-style:none;display:flex;gap:10px;align-items:flex-start}
summary::-webkit-details-marker{display:none}
summary::before{content:"+";font-family:var(--font-mono);color:var(--teal);flex:0 0 12px}
details[open] summary::before{content:"–"}
details p{margin:12px 0 0 22px;font-size:14px}
summary:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

/* ---- GLOSSARY ---- */
.gloss{border-top:1px solid var(--border)}
.gloss-row{display:grid;grid-template-columns:190px 1fr;gap:20px;padding:14px 0;border-bottom:1px solid var(--border)}
.gloss-t{font-weight:600;font-size:14px;color:var(--text)}
.gloss-d{font-size:14px;color:var(--text-dim)}

/* ---- MOBILE ---- */
.scrim{display:none;position:fixed;inset:0;background:rgba(15,25,25,.45);z-index:35}
.scrim.on{display:block}
@media (max-width:960px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .22s ease}
  .sidebar.open{transform:none}
  .topbar{display:flex}
  .content{padding:32px 22px 90px}
  .gloss-row{grid-template-columns:1fr;gap:4px}
  .rub-band{grid-template-columns:1fr}
  .rub-lvl{border-right:0;border-bottom:1px solid var(--border)}
  .pager{flex-direction:column}
  .pager .next{text-align:left}
}

/* ---- PRINT ---- */
@media print{
  .sidebar,.topbar,.pager,.done-btn,.scrim,.print-btn,.theme-btn{display:none!important}
  body{background:#fff;color:#000;font-size:11pt}
  .content{padding:0;max-width:none}
  .card,.q,.callout,.rub{break-inside:avoid;border-color:#bbb}
  h1{font-size:24pt}h2{font-size:15pt;margin-top:22pt}
  a{color:#000;text-decoration:none}
  .spine-row{break-inside:avoid}
}
</style>
</head>
<body>

<div class="scrim" id="scrim" aria-hidden="true"></div>

<div class="shell">
  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar" id="sidebar" aria-label="Programme navigation">
    <div class="brand">
      <div class="brand-mark">Executive<br><em>Support</em> Programme</div>
      <div class="brand-sub">Canonical Reference · v2</div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="7" r="4.6"/><path d="M10.5 10.5L14 14"/></svg>
      <input class="search-input" id="search" type="search" placeholder="Search the programme" autocomplete="off" aria-label="Search" />
      <div class="search-results" id="searchResults" role="listbox"></div>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="side-foot">
      <button class="theme-btn" id="themeBtn" aria-label="Toggle colour theme">Dark</button>
      <button class="print-btn" onclick="window.print()">Print</button>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <div class="main">
    <div class="topbar">
      <button class="burger" id="burger" aria-label="Open navigation">

     ["C","Use an enterprise or on-device tool with a confidentiality guarantee if one is available; if not, summarise the decision-relevant sections yourself and tell your executive what you did not cover."],
     ["D","Ask your executive whether it is acceptable to use a public model."]
    ], key:2,
    why:"A is a disclosure regardless of the verification that follows. B is honest and leaves your executive walking into a meeting blind on twenty-five pages. D outsources a judgment that is yours to hold and does so under time pressure. C is the only answer that solves the problem within the constraint and tells the truth about the gap." },
  { arch:"Justify the tradeoff", stem:"Automating a weekly report saves ninety minutes and introduces a small probability of an undetected factual error. Automating a calendar reconciliation saves twenty minutes and introduces the same probability. Argue which you automate first.",
    freeform:true,
    why:"The naive answer optimises for time saved. The correct reasoning is about the detectability and cost of the error. A calendar error surfaces within a day and is cheap. A factual error in a report reaches a decision and may never surface. Time saved is the least important variable in the question and the strongest answers say so." },
  { arch:"Spot the error", stem:"A learner's automation drafts client emails, sends them automatically if a confidence score exceeds a threshold, and flags the rest for review. Identify the design failure.",
    freeform:true,
    why:"The confidence score measures the model's certainty, not the correctness or the appropriateness of the message. High-confidence errors are precisely the ones that will be sent. The checkpoint has been placed where it catches the safe cases and misses the dangerous ones." }

 questions:[
  { arch:"Justify the tradeoff", stem:"A decision is fully reversible and moderately expensive. Another is irreversible and nearly free. Which do you take alone?",

  { arch:"Scenario-judgment", stem:"Your executive is unreachable for six hours. A client threatens to withdraw unless a discount is confirmed within the hour. You know the executive has given this discount before, to this client.",
    opts:[

     ["B","Tell the client you cannot confirm and will revert within six hours."],
     ["C","Tell the client the discount is under active consideration, that you have escalated it, and that you will revert within six hours with a decision."],

    why:"A takes an irreversible commercial decision on the strength of precedent, which is not authority. D is A wearing a coat, and the client will not hear the condition. B is defensible and surrenders the relationship in the interval. C holds the client, commits to nothing, and returns an irreversible decision to the person who owns it. The threat is almost always more elastic than it presents." },

  { arch:"Justify the tradeoff", stem:"Under compounding failure you can either communicate constantly, keeping everyone informed and yourself interrupted, or communicate at fixed intervals, leaving people uninformed between them. Argue one.",

function crumbs(parts){
  const out=[];
  parts.forEach((p,i)=>{
    if(i) out.push('<span class="sep">/</span>');
    if(p.href) out.push('<a href="'+p.href+'">'+esc(p.label)+'</a>');

function pager(prev,next){
  let h='<div class="pager">';
  h += prev ? '<a href="'+prev.href+'"><div class="dir">Previous</div><div class="ttl">'+esc(prev.label)+'</div></a>' : '<span style="flex:1"></span>';
  h += next ? '<a class="next" href="'+next.href+'"><div class="dir">Next</div><div class="ttl">'+esc(next.label)+'</div></a>' : '<span style="flex:1"></span>';
  return h+'</div>';
}

  out.push('<div class="q">');

V.philosophy = () => {
  const out=[];
  out.push(crumbs([{label:"Overview",href:"#/overview"},{label:"Philosophy"}]));
  out.push('<div class="eyebrow">Foundations</div>');
  out.push('<h1>Programme <em>philosophy</em></h1>');
  out.push('<p class="lede">Executive support is not a service performed for a person. It is a system operated alongside one. The distinction is the whole programme.</p>');

  out.push('<h2>The executive support philosophy</h2>');
  out.push('<p>An executive holds a small number of decisions that only they can make, and a very large number of obligations that surround those decisions. The obligations do not become less real for being secondary. They consume the attention that the decisions require. The purpose of executive support is to hold the obligations so completely that the decisions receive the attention they were owed.</p>');
  out.push('<p>This has three consequences that shape everything downstream.</p>');
  out.push('<p><strong>The work is judgment, not execution.</strong> A task can be delegated to anyone competent. An outcome can only be delegated to someone whose judgment you trust. ESP trains for the second condition. Every assignment in this programme asks a learner to decide something, and then to defend the decision.</p>');
  out.push('<p><strong>The work is proximate.</strong> An assistant is present for an executive at their most strained and least composed. This is not incidental to the role, it is the role, and it is why disposition, discretion, and personal systems are assessed here with the same rigour as tooling and workflow.</p>');
  out.push('<p><strong>The work is a beginning.</strong> The executive support path has produced chiefs of staff, operations directors, and chief executives, because proximity to decision-making is the fastest available education in how decisions are made. ESP is designed with that ceiling in view. It is why the programme trains people to hold outcomes rather than to complete tasks, and why the final assessment is a defence rather than a submission.</p>');

  out.push('<h2>Educational philosophy</h2>');
  out.push('<p>Four commitments govern the design of every session.</p>');
  out.push('<p><strong>Judgment is assessed, memory is not.</strong> No assessment item in this programme asks a learner to recall a definition. Every item places them inside a situation and asks what they would do, why that answer defeats the alternatives, and what it would cost if they were wrong. Wrong answers in this programme are wrong for specific and non-obvious reasons, because the wrong answers a professional actually chooses are always the plausible ones.</p>');
  out.push('<p><strong>Difficulty is a teaching instrument.</strong> The confidentiality drill in Week 6 is designed so that nobody passes on the first attempt. The simulation in Week 9 is designed to be unfair. A learner who has never failed inside the programme will fail for the first time inside a placement, where it is expensive and unrecoverable.</p>');
  out.push('<p><strong>Everything produced is evidence.</strong> Assignments are not exercises. Each one is a component of the Executive Operating Blueprint, which is the document a client reads before deciding whether to trust the graduate. Nothing is submitted here that is discarded afterwards.</p>');
  out.push('<p><strong>Retention is engineered, not hoped for.</strong> Every weekly assessment carries items from earlier weeks. By Week 13 a learner is being tested across the entire programme arc. A learner who understood Week 2 and forgot it has not learned it, and the assessment structure refuses to pretend otherwise.</p>');

  out.push('<h2>Professional standards</h2>');
  out.push('<p>The programme holds standards because the work does. These are stated at admission and applied without exception.</p>');
  out.push('<ul>');
  out.push('<li>Attendance at the live session, or verified completion of the recording to the tracked threshold, is a condition of progression.</li>');
  out.push('<li>Assignments are submitted by the stated deadline. A late submission without prior notice is a non-submission.</li>');
  out.push('<li>Cohort communication is professional. A learner is being observed from the first message, because a client will be.</li>');
  out.push('<li>Session recordings and programme materials are confidential and are not distributed outside the cohort.</li>');
  out.push('<li>Feedback is developmental. It is received as information, not as injury.</li>');
  out.push('<li>Problems are raised directly with the programme team, privately and promptly, and not in the group channel.</li>');
  out.push('</ul>');

  out.push('<h2>Behavioural expectations</h2>');
  out.push('<p>Three behaviours are treated as non-negotiable because each of them, once broken, cannot be repaired inside a placement.</p>');
  out.push('<div class="callout"><h4>Discretion</h4><p>A learner who discloses something told to them in confidence, inside the cohort or outside it, is removed from the programme. There is no first warning, because there is no first warning in the profession.</p></div>');
  out.push('<div class="callout"><h4>Truthfulness under exposure</h4><p>A learner who conceals a mistake is treated more seriously than a learner who made a larger one and disclosed it. The programme rewards disclosure explicitly and repeatedly, so that the instinct exists before it is needed.</p></div>');
  out.push('<div class="callout"><h4>Completion without supervision</h4><p>Drive carries the highest weighting in SCOUTED for a reason. The single most reliable predictor of a successful placement is whether a person finishes work that nobody is checking.</p></div>');

  out.push(pager({href:"#/overview",label:"Overview"},{href:"#/curriculum",label:"The Learning Journey"}));
  return out.join("");
};

  $$(".tree-toggle").forEach(b=>{
    b.addEventListener("click",()=>{
      const ph = b.parentElement;
      const open = ph.classList.toggle("open");
      b.setAttribute("aria-expanded", open?"true":"false");
    });
  });
}

function syncNav(hash){
  $$(".nav-link,.tree-link").forEach(a=>{
    a.classList.toggle("active", a.getAttribute("href")===hash);
  });
  const active = $(".tree-link.active");
  if(active){
    const ph = active.closest(".tree-phase");
    if(ph && !ph.classList.contains("open")){
      ph.classList.add("open");
      ph.querySelector(".tree-toggle").setAttribute("aria-expanded","true");
    }
  }
}

/* =====================================================================
   SEARCH
   ===================================================================== */
const INDEX = [];
function buildIndex(){
  INDEX.push({kind:"Page",t:"Overview",h:"#/overview",b:"canonical reference esp mosaic executive support programme"});
  INDEX.push({kind:"Page",t:"Programme philosophy",h:"#/philosophy",b:"educational philosophy professional standards behavioural expectations discretion truthfulness drive"});
  INDEX.push({kind:"Page",t:"Learning journey",h:"#/curriculum",b:"roadmap phases weekly cycle checkpoints fourteen weeks"});
  INDEX.push({kind:"Page",t:"Tracks",h:"#/tracks",b:"access track s12 3mtt twi free scaled community mentorship"});
  INDEX.push({kind:"Page",t:"Assessment design",h:"#/assessment",b:"weighting archetypes spaced repetition gating evidence"});
  INDEX.push({kind:"Page",t:"Entrance assessment",h:"#/entrance",b:"admission threshold four questions scoring"});
  INDEX.push({kind:"Page",t:"Assessment bank",h:"#/questions",b:"questions items marking notes"});
  INDEX.push({kind:"Page",t:"Executive Operating Blueprint",h:"#/eob",b:"capstone six components marking bands assisted first pass"});
  INDEX.push({kind:"Page",t:"SCOUTED framework",h:"#/framework/scouted",b:"seven dimensions rubric pool id"});
  INDEX.push({kind:"Page",t:"Graduation",h:"#/graduation",b:"badges pool placement candidate dossier compensation"});
  INDEX.push({kind:"Page",t:"Questions",h:"#/faq",b:"faq participants partners facilitators"});
  INDEX.push({kind:"Page",t:"Glossary",h:"#/glossary",b:"terms definitions"});
  INDEX.push({kind:"Page",t:"Resources",h:"#/resources",b:"templates frameworks reading library"});
  INDEX.push({kind:"Page",t:"All assignments",h:"#/assignments",b:"assignments formats"});

  SESSIONS.forEach(s=>{
    INDEX.push({kind:"Week "+s.w, t:s.title, h:"#/session/"+s.w, b:(s.thesis+" "+s.intro+" "+s.objectives.join(" ")+" "+s.activity).toLowerCase()});
    INDEX.push({kind:"Assignment · W"+s.w, t:s.assignment.brief.slice(0,64)+"…", h:"#/assignment/"+s.assignment.id, b:(s.assignment.kind+" "+s.assignment.fields.join(" ")).toLowerCase()});
  });
  SCOUTED.forEach(d=>INDEX.push({kind:"Competency", t:d.name, h:"#/competency/"+d.id, b:d.def.toLowerCase()}));
  EOB.forEach(e=>INDEX.push({kind:"Blueprint component", t:e.name, h:"#/eob#"+e.id, b:e.what.toLowerCase()}));
  GLOSSARY.forEach(g=>INDEX.push({kind:"Glossary", t:g[0], h:"#/glossary", b:g[1].toLowerCase()}));
}

function runSearch(q){
  const box = $("#searchResults");
  const term = q.trim().toLowerCase();
  if(term.length < 2){ box.classList.remove("open"); box.innerHTML=""; return; }
  const hits = INDEX.filter(x=> x.t.toLowerCase().includes(term) || x.b.includes(term) || x.kind.toLowerCase().includes(term)).slice(0,12);
  if(!hits.length){ box.innerHTML='<div class="sr-empty">Nothing matches that.</div>'; box.classList.add("open"); return; }
  box.innerHTML = hits.map(h=>'<a class="sr-item" href="'+h.h+'"><div class="sr-kind">'+esc(h.kind)+'</div><div class="sr-title">'+esc(h.t)+'</div></a>').join("");
  box.classList.add("open");
  $$(".sr-item",box).forEach(a=>a.addEventListener("click",()=>{ box.classList.remove("open"); $("#search").value=""; }));
}

/* =====================================================================
   PROGRESS
   ===================================================================== */
function updateProgress(){
  const fill = $("#progFill"), txt = $("#progText");
  if(!fill) return;
  const pct = Math.round((completed.size/14)*100);
  fill.style.width = pct+"%";
  txt.textContent = completed.size+" of 14 sessions marked complete";
}

/* =====================================================================
   ROUTER
   ===================================================================== */
function render(){
  const raw = location.hash || "#/overview";
  const [path, frag] = raw.slice(2).split("#");
  const seg = path.split("/").filter(Boolean);
  let html;

  switch(seg[0]){
    case undefined:
    case "overview":   html = V.overview(); break;
    case "philosophy": html = V.philosophy(); break;
    case "curriculum": html = V.curriculum(); break;
    case "session":    html = V.session(seg[1]); break;
    case "assignments":html = V.assignments(); break;
    case "assignment": html = V.assignment(seg[1]); break;
    case "framework":  html = V.framework(); break;
    case "competency": html = V.competency(seg[1]); break;
    case "eob":        html = V.eob(); break;
    case "assessment": html = V.assessment(); break;
    case "entrance":   html = V.entrance(); break;
    case "questions":  html = V.questions(); break;
    case "tracks":     html = V.tracks(); break;
    case "graduation": html = V.graduation(); break;
    case "faq":        html = V.faq(); break;
    case "glossary":   html = V.glossary(); break;
    case "resources":  html = V.resources(); break;
    default:           html = V.notfound();
  }

  const view = $("#view");
  view.innerHTML = html;
  syncNav("#/"+path);
  updateProgress();

  const btn = $(".done-btn");
  if(btn){
    btn.addEventListener("click",()=>{
      const w = +btn.dataset.week;
      if(completed.has(w)){ completed.delete(w); btn.classList.remove("on"); btn.textContent="Mark complete"; }
      else { completed.add(w); btn.classList.add("on"); btn.textContent="Marked complete"; }
    });
  }

  if(frag){
    const el = document.getElementById(frag);
    if(el){ el.scrollIntoView(); return; }
  }
  window.scrollTo(0,0);
  view.focus({preventScroll:true});
  $("#sidebar").classList.remove("open");
  $("#scrim").classList.remove("on");
}

/* =====================================================================
   BOOT
   ===================================================================== */
buildNav();
buildIndex();
window.addEventListener("hashchange", render);

$("#search").addEventListener("input", e=>runSearch(e.target.value));
$("#search").addEventListener("blur", ()=> setTimeout(()=> $("#searchResults").classList.remove("open"), 160));
document.addEventListener("keydown", e=>{
  if((e.metaKey||e.ctrlKey) && e.key==="k"){ e.preventDefault(); $("#search").focus(); }
  if(e.key==="Escape"){ $("#searchResults").classList.remove("open"); }
});

const themeBtn = $("#themeBtn");
themeBtn.addEventListener("click",()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur==="dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  themeBtn.textContent = next==="dark" ? "Light" : "Dark";
});

$("#burger").addEventListener("click",()=>{
  $("#sidebar").classList.add("open");
  $("#scrim").classList.add("on");
});
$("#scrim").addEventListener("click",()=>{
  $("#sidebar").classList.remove("open");
  $("#scrim").classList.remove("on");
});

render();
</script>
</body>
</html>
